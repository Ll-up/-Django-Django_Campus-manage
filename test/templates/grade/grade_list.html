{% extends "main.html" %}
{% load static %}
{% block content %}
<link href="{% static 'css/list.css' %}?v={{ timestamp|default:'1' }}"  rel="stylesheet"/>
<table><!--表格容器 -->
    <thead>
         <th>id</th><!--行头 -->
        <th>班级</th>
        <th>班级编号</th>>
        <th>操作</th>
    </thead>
    <tbody>
    {% for gra in grade %}
    <tr>
        <td>{{gra.id}}</td>
        <td>{{gra.grade_name}}</td>
        <td>{{gra.grade_number}}</td>
        <td><a class="delete" href="{% url 'grade_delete' gra.pk %}">删除</a></td>
    </tr>
    {% endfor %}
    </tbody>
</table>

<button id="create">新增班级</button>
<script>
var a=document.querySelectorAll('a')
a[0].className="nav-items"
a[1].className="nav-items"
a[2].className="nav-items"
a[3].className="nav-items active"
document.getElementById("create").addEventListener('click',function(){
    Swal.fire({
  position: "top-end",
  html: `<iframe src="{% url 'grade_create' %}" width="100%",height="100%" frameborder="0"><iframe>`,
  width: 600,
  showConfirmButton: false
}); 
})

document.querySelectorAll('.delete').forEach(button=>{
    button.addEventListener('click',function(e){
        e.preventDefault();
         url=this.getAttribute('href')
        swal.fire({
                title: "确认删除",
                icon: "success",
                showConfirmButton: true,
                confirmButtonTex:"删除",
                confirmButtonColor:"%d33",
            }).then((result)=>{
                if (result.isConfirmed){
                    fetch(url,{
                        method:'DELETE',
                        headers:{
                            'X-Requested-With': 'XMLHttpRequest',
                            'X-CSRFToken':'{{ csrf_token }}',
                        }
                        }).then(()=>window.parent.location.reload())
                                    }
                })
    })
})
</script>
{% endblock %}
